<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAttendance | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800;900&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* High-quality campus background with a soft blue tint overlay */
            background: linear-gradient(rgba(241, 245, 249, 0.85), rgba(37, 99, 235, 0.7)), url('https://images.unsplash.com/photo-1541339907198-e08756defe73?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 3rem;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.15);
        }

        .input-focus:focus-within {
            border-color: #2563eb;
            background-color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.1);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md">
        <div class="flex flex-col items-center mb-10 text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-[1.8rem] flex items-center justify-center shadow-2xl shadow-blue-200 mb-4 transform hover:rotate-6 transition-transform">
                <i class="fas fa-user-graduate text-white text-4xl"></i>
            </div>
            <h1 class="text-4xl font-[900] text-slate-800 tracking-tighter">SmartAttendance</h1>
            <p class="text-blue-600 font-bold text-[10px] uppercase tracking-[0.4em] mt-2">Presence to Potential</p>
        </div>

        <div class="login-card p-10">
            <div class="mb-8">
                <h2 class="text-2xl font-black text-slate-900 italic tracking-tight">Focus & Succeed.</h2>
                <p class="text-slate-400 text-sm mt-1 font-medium">Log in to track your academic journey.</p>
            </div>

            <form id="authForm" class="space-y-6">
                <div class="input-focus p-1 bg-slate-50 border border-slate-100 rounded-2xl transition-all duration-300">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mt-2 ml-4">User Identifier</label>
                    <div class="relative flex items-center px-4 pb-2">
                        <i class="fas fa-id-card text-slate-300 mr-3"></i>
                        <input type="text" id="userID" required placeholder="e.g. STU123 / FAC456" class="w-full bg-transparent py-2 font-bold text-slate-800 outline-none placeholder:text-slate-200">
                    </div>
                </div>

                <div class="input-focus p-1 bg-slate-50 border border-slate-100 rounded-2xl transition-all duration-300">
                    <div class="flex justify-between px-4 mt-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400">Access Key</label>
                        <a href="#" class="text-[10px] font-bold text-blue-600 uppercase tracking-widest hover:underline">Forgot?</a>
                    </div>
                    <div class="relative flex items-center px-4 pb-2">
                        <i class="fas fa-lock-alt text-slate-300 mr-3"></i>
                        <input type="password" id="password" required placeholder="••••••••" class="w-full bg-transparent py-2 font-bold text-slate-800 outline-none placeholder:text-slate-200">
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl shadow-blue-100 transition-all active:scale-[0.98]">
                    Authorize & Enter Portal <i class="fas fa-chevron-right ml-2"></i>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-50 text-center">
                <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest">
                    SmartCloud Verified &bull; 2026
                </p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('authForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const userID = document.getElementById('userID').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userID: userID,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.status === "success") {

                    // store register number s user_id
                    localStorage.setItem("user_id", data.user_id);

                    // 🔥 redirect based on role (FROM DATABASE)
                    if (data.role === "student") {
                        window.location.href = "/student";
                    } else if (data.role === "faculty") {
                        window.location.href = "/faculty";
                    } else if (data.role === "admin") {
                        window.location.href = "/admin";
                    }

                } else {
                    alert(data.message);
                }

            } catch (error) {
                alert("Server error. Make sure Flask is running.");
            }
        });
    </script>

</body>

</html>
